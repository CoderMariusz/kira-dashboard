name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Run unit/component tests only.
      # Playwright specs (e2e/, tests/) and integration tests needing live DB are excluded.
      # Integration test cleanup tracked in EPIC-14 (Test Infrastructure).
      - run: |
          npm test -- --ci --passWithNoTests \
            --testPathIgnorePatterns="<rootDir>/e2e/" \
            --testPathIgnorePatterns="<rootDir>/tests/" \
            --testPathIgnorePatterns="<rootDir>/node_modules/" \
            --testPathIgnorePatterns="<rootDir>/.next/" \
            --testPathIgnorePatterns="<rootDir>/archive/" \
            --testPathIgnorePatterns="__tests__/db/bridge-tables" \
            --testPathIgnorePatterns="__tests__/sync/" \
            --testPathIgnorePatterns="__tests__/api/stories-start" \
            --testPathIgnorePatterns="__tests__/api/stories-advance" \
            --testPathIgnorePatterns="__tests__/api/patterns-supabase" \
            --testPathIgnorePatterns="__tests__/api/nightclaw/research" \
            --testPathIgnorePatterns="__tests__/api/nightclaw/history" \
            --testPathIgnorePatterns="__tests__/middleware/settings-guard" \
            --testPathIgnorePatterns="__tests__/app/settings/users/page"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
